<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Humble Bundle Owned Overlay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      width: 280px;
      margin: 0;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    h1 {
      margin: 0;
      color: #fff;
      font-size: 15px;
      line-height: 1.25;
    }

    .version {
      display: inline-block;
      margin-top: 7px;
      padding: 3px 7px;
      border: 1px solid #2a2a4a;
      border-radius: 999px;
      background: #16213e;
      color: #aaa;
      font-size: 11px;
      font-weight: 600;
    }

    dl {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 12px;
      margin: 16px 0;
      padding: 12px;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      background: #16213e;
    }

    dt {
      color: #aaa;
      font-weight: 600;
    }

    dd {
      margin: 0;
      color: #fff;
      text-align: right;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 6px;
      background: #1a9e1a;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      padding: 9px 12px;
    }

    button:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <h1>Humble Bundle Owned Overlay</h1>
  <span class="version" id="version"></span>

  <dl>
    <dt>Status</dt>
    <dd id="status">Checking...</dd>
    <dt>Games</dt>
    <dd id="game-count">-</dd>
    <dt>Updated</dt>
    <dd id="last-updated">-</dd>
  </dl>

  <button id="open-options" type="button">Open settings</button>

  <script src="popup.js"></script>
</body>
</html>
