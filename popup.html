<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Humble Bundle Owned Overlay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 280px;
      margin: 0;
      padding: 14px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
    }

    h1 {
      font-size: 13px;
      font-weight: 700;
      margin: 0 0 10px;
      color: #fff;
    }

    .stats {
      font-size: 12px;
      color: #aaa;
      line-height: 1.6;
      margin-bottom: 10px;
      min-height: 32px;
    }
    .stats strong { color: #e0e0e0; font-weight: 600; }

    button#refresh-btn {
      width: 100%;
      background: #1a9e1a;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 9px;
    }
    button#refresh-btn:hover:not(:disabled) { opacity: 0.85; }
    button#refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #status {
      font-size: 12px;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 4px;
      display: none;
      line-height: 1.4;
    }
    #status.ok { display: block; background: #0d3b0d; color: #5de05d; }
    #status.err { display: block; background: #3b0d0d; color: #e05d5d; }
    #status.info { display: block; background: #0d1f3b; color: #5d9de0; }

    .footer {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
    }
    .footer a {
      color: #5b9bd5;
      text-decoration: none;
      cursor: pointer;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Humble Bundle Owned Overlay</h1>
  <div class="stats" id="stats">Loading…</div>
  <button id="refresh-btn" type="button">Refresh from Steam</button>
  <div id="status"></div>
  <div class="footer">
    <a id="settings-link">Settings</a>
    <a id="steam-link" href="https://store.steampowered.com/" target="_blank" rel="noopener">Steam</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
